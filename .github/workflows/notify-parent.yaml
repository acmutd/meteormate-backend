name: Notify parent repo

on:
  push:
    branches: [main, dev]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch subtree update event
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH_NAME="${GITHUB_REF#refs/heads/}"
          echo "Dispatching for branch: $BRANCH_NAME"
          
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            /repos/acmutd/meteormate-client/dispatches \
            -f event_type="subtree-updated" \
            -f client_payload[branch]="$BRANCH_NAME"
